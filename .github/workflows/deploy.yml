name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_HASURA_GRAPHQL_URL: ${{ vars.VITE_HASURA_GRAPHQL_URL || 'https://sunny-zebra-57.hasura.app/v1/graphql' }}
  VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - run: npm ci

    - name: Lint
      run: npx eslint .

    - name: Dependency audit
      run: npm audit --audit-level=high

    - name: Type check
      run: npx tsc --noEmit

    - name: Test
      run: npm test

    - name: Build
      run: npm run build
      env:
        VITE_HASURA_GRAPHQL_URL: ${{ vars.VITE_HASURA_GRAPHQL_URL || 'https://sunny-zebra-57.hasura.app/v1/graphql' }}
        VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

    - name: Secret scan
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

  build-and-deploy:
    needs: check
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - run: npm ci

    - name: Build
      run: npm run build
      env:
        VITE_HASURA_GRAPHQL_URL: ${{ vars.VITE_HASURA_GRAPHQL_URL || 'https://sunny-zebra-57.hasura.app/v1/graphql' }}
        VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

    - uses: actions/configure-pages@v4

    - uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - id: deployment
      uses: actions/deploy-pages@v4
